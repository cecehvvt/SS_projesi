spring.application.name=backend
server.port=8081
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Yerel gelistirmede backend/.env dosyasini otomatik oku. Dosya git'e eklenmez.
spring.config.import=optional:file:.env[.properties]

# ---------------------------------------------------------------------------
# Supabase Postgres baglantisi
# Sifreyi ortam degiskeni olarak verin: SUPABASE_DB_PASSWORD
# (Supabase panel -> Project Settings -> Database)
#
# Varsayilan: Connection Pooler (Supavisor, IPv4 - her agda calisir). DOGRULANDI.
#   Bolge: ap-southeast-1  |  kullanici: postgres.rqhylrxkbxmvdromdwlt
# Alternatif - Dogrudan baglanti (yalnizca IPv6 destekli aglarda calisir):
#   SUPABASE_DB_URL=jdbc:postgresql://db.rqhylrxkbxmvdromdwlt.supabase.co:5432/postgres?sslmode=require
#   SUPABASE_DB_USER=postgres
# ---------------------------------------------------------------------------
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USER:postgres.rqhylrxkbxmvdromdwlt}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Tablolar yoksa otomatik olusturulsun (schema.sql)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
